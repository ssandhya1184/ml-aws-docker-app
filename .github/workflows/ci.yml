name: Employee Attrition CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: Install uv
              uses: astral-sh/setup-uv@v5
            
            - name: Install dependencies
              run: uv sync --locked
            
            - name: Run Tests
              run: uv run pytest          
                     
            - name: Build Docker image
              run: docker build -t employee-attrition-app .