name: Employee Attrition CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"
            
            - name: Show Python version
              run: python --version

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Show uv version
              run: uv --version
            
            - name: Install dependencies
              run: uv sync --locked
            
            - name: Run Tests
              run: uv run pytest -v        
                     
            - name: Build Docker image
              run: docker build -t employee-attrition-app .